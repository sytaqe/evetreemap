name: Update kill statistics

# Manual only. Regenerates public/data/kill_stats/ incrementally and commits any
# changes to main. The processed-id lists are persisted with actions/cache so
# each run only fetches killmails that were not counted before.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days to aggregate"
        default: "7"
      max_per_day:
        description: "Killmails per day cap (0 = full, no sampling)"
        default: "500"

permissions:
  contents: write
  actions: write # allow `gh workflow run` to dispatch the deploy workflow

concurrency:
  group: kill-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Check out the live tip of main, not the commit this run was pinned to at
      # dispatch. A run queued behind another (shared concurrency group) would
      # otherwise start from a stale base — missing the prior run's commit — and
      # re-aggregate the same day files divergently, which then can't be merged
      # on the push rebase.
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Rolling cache: a unique key each run always saves, and the prefix
      # restore-key loads the most recent previous id lists.
      - name: Restore processed-id cache
        uses: actions/cache@v6
        with:
          path: .cache/processed_ids
          key: killstats-ids-${{ github.run_id }}
          restore-keys: |
            killstats-ids-

      - name: Aggregate kill statistics
        env:
          # Full ESI User-Agent (with contact) — kept out of the repo. Add a
          # repository secret named ESI_USER_AGENT.
          ESI_USER_AGENT: ${{ secrets.ESI_USER_AGENT }}
        run: >-
          python scripts/build_kill_stats.py
          --days "${{ inputs.days }}"
          --max-per-day "${{ inputs.max_per_day }}"

      - name: Commit updated kill statistics
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/kill_stats
          # Newest day file (dates sort lexically). "latest day changed" means
          # this file was created or modified in this run — i.e. a new day rolled
          # over or the most recent day's aggregate changed.
          latest="$(ls public/data/kill_stats/[0-9]*.json | sort | tail -1)"
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "latest_changed=false" >> "$GITHUB_OUTPUT"
          else
            if git diff --cached --quiet -- "$latest"; then
              echo "latest_changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "latest_changed=true" >> "$GITHUB_OUTPUT"
            fi
            git commit -m "Update kill statistics (manual run)"
            # Other data workflows push to main too, and it may have advanced
            # during this (possibly multi-hour) run. Rebase onto the latest main
            # and retry so a concurrent commit doesn't reject the push.
            pushed=false
            for attempt in 1 2 3 4 5; do
              if git push; then pushed=true; break; fi
              echo "push rejected (attempt $attempt) — rebasing on updated main"
              git pull --rebase origin main
            done
            if [ "$pushed" != true ]; then
              echo "::error::failed to push kill statistics after retries"; exit 1
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # A push made with GITHUB_TOKEN does not trigger the deploy workflow, so
      # dispatch it explicitly. Skip it when the latest day changed — then
      # market-prices.yml (below) deploys after regenerating prices, so we never
      # publish new kill data against stale prices.
      - name: Trigger deploy
        if: >-
          steps.commit.outputs.changed == 'true' &&
          steps.commit.outputs.latest_changed != 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # When the latest day changed, refresh market prices too — they cover the
      # latest two days' items. market-prices.yml commits and deploys on its own,
      # which is the deploy for this run.
      - name: Trigger market-price refresh
        if: steps.commit.outputs.latest_changed == 'true'
        run: gh workflow run market-prices.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
